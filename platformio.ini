[platformio]
default_envs = teensy40

; ============================================================================
; Teensy 4.0 Onboard Environment
; ============================================================================

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino

; Build configuration
build_flags = 
    -std=gnu++17
    -O2
    -Wall
    -Wextra
    -DUSB_SERIAL
    -DLAYOUT_US_ENGLISH
    -DUSE_QUATERNIONS
    -DENABLE_SENSOR_FUSION

; Library dependencies
lib_deps = 
    adafruit/Adafruit BNO055 @ ^1.6.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    lowpowerlab/RFM69 @ ^1.5.3
    arduino-libraries/Servo @ ^1.2.1

; Upload configuration
upload_protocol = teensy-gui
upload_speed = 115200

; Serial monitor configuration
monitor_speed = 9600
monitor_filters = 
    colorize
    time
    log2file

; Test configuration
test_framework = unity
test_build_src = yes

; Advanced board settings
board_build.mcu = imxrt1062
board_build.f_cpu = 600000000L

; ============================================================================
; Native Testing Environment (for unit tests on host)
; ============================================================================

[env:native]
platform = native
test_framework = unity
build_flags = 
    -std=c++17
    -Wall
    -Wextra
    -DUNIT_TEST

; ============================================================================
; Remote Control Environment
; ============================================================================

[env:teensy40_remote]
extends = env:teensy40
build_src_filter = 
    +<../arduino/remote_active/>
    -<../arduino/onboard_active/>

; ============================================================================
; Documentation Generation
; ============================================================================

[env:docs]
platform = native
extra_scripts = 
    post:scripts/generate_docs.py
